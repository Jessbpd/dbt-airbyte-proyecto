version: 2

sources:
  - name: customers_source
    description: "Datos de clientes cargados por Airbyte desde CSV"
    schema: airbyte_raw
    database: airbyte_db
    tables:
      - name: customers
        description: "Tabla de clientes cargada por Airbyte"
        columns:
          - name: customer_id
            tests:
              - unique
              - not_null
          - name: email
            tests:
              - not_null

  - name: orders_source
    description: "Datos de órdenes cargados por Airbyte desde CSV"
    schema: airbyte_raw
    database: airbyte_db
    tables:
      - name: orders
        description: "Tabla de órdenes cargada por Airbyte"
        columns:
          - name: order_id
            tests:
              - unique
              - not_null
          - name: customer_id
            tests:
              - not_null